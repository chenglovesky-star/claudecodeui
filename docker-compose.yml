services:
  claude-code-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code-ui
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - docker.env
      - .env
    volumes:
      # SQLite 数据库持久化（使用宿主机目录，与旧部署保持一致）
      - /data/claude-code-ui/db:/data/db
      # 工作空间目录（团队共享的项目文件）
      - /data/claude-code-ui/workspace:/workspace
      # Claude CLI 配置和凭证持久化（容器内登录后凭证不丢失）
      - /data/claude-code-ui/.claude:/home/claude/.claude
      # Shell Preset 切换配置（从项目根目录挂载，修改后重启容器即可生效）
      - ./shell-presets.json:/app/shell-presets.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
