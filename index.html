<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CloudCLI UI</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials"  />
    
    <!-- iOS Safari PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Claude UI" />
    
    <!-- iOS Safari Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    
    <!-- Prevent zoom on iOS -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Force cleanup old Service Worker cache to prevent white screen -->
    <script>
      (function() {
        var SW_VERSION = 'v2';
        var migrationKey = 'sw-migrated-' + SW_VERSION;
        if (localStorage.getItem(migrationKey)) return;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length === 0) {
              localStorage.setItem(migrationKey, '1');
              return;
            }
            var tasks = regs.map(function(r) { return r.unregister(); });
            tasks.push(caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }));
            Promise.all(tasks).then(function() {
              localStorage.setItem(migrationKey, '1');
              location.reload();
            });
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js');
            // Force check for SW updates
            registration.update();
            console.log('SW registered: ', registration);
          } catch (err) {
            console.log('SW registration failed: ', err);
          }
        });
      }
    </script>
  </body>
</html>
