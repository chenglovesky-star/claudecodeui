server:
  # 端口
  port: 6002
  servlet:
    # 项目名称
    # 开发环境
    context-path : /


spring:
  application:
    name: flint-analysis
  messages:
    basename: ValidationMessages
    encoding: UTF-8
  datasource:
    #数据源基本信息，也可放在druid下
    impalaUrl: jdbc:mysql://172.31.114.188:9030/ods?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    impalaUsername: root
    impalaPassword: root
    impalaDriverClassName: com.mysql.jdbc.Driver

    url: jdbc:mysql://localhost:3306/flint
    username: root
    password: 123456
    driverClassName: com.mysql.cj.jdbc.Driver
    initialSize: 1
    minIdle: 3
    maxActive: 50
    maxWait: 60000
    timeBetweenEvictionRunsMillis: 60000
    minEvictableIdleTimeMillis: 30000
    validationQuery: select 1
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    poolPreparedStatements: true
    maxPoolPreparedStatementPerConnectionSize: 20
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.iflytek.bigdata.flint.*.dao.model
  configuration:
    map-underscore-to-camel-case: true
